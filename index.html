<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>World Clock Timeline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      padding: 16px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 20px; font-weight: 300; letter-spacing: 2px; font-size: 1.5rem; }
    
    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    select, button {
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
    }
    select {
      background: #1a1a1a;
      color: #fff;
      flex: 1;
      min-width: 150px;
    }
    button {
      background: #3b82f6;
      color: white;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover { background: #2563eb; }
    
    .timeline {
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
    }
    .city-row {
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid #2a2a2a;
    }
    .city-row:last-child { border-bottom: none; }
    .city-info {
      width: 90px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 12px;
      background: #151515;
    }
    .city-name {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 4px;
    }
    .city-current {
      font-size: 11px;
      color: #888;
    }
    .city-remove {
      background: transparent;
      color: #666;
      border: none;
      padding: 4px 8px;
      font-size: 16px;
      cursor: pointer;
      align-self: flex-start;
      margin-top: 4px;
    }
    .city-remove:hover { background: transparent; color: #ef4444; }
    
    .hours-wrapper {
      flex: 1;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: #333 #1a1a1a;
    }
    .hours {
      display: flex;
      min-width: max-content;
      height: 100%;
    }
    .hour {
      width: 50px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 4px;
      border-right: 1px solid #252525;
      position: relative;
    }
    .hour:last-child { border-right: none; }
    .hour.current {
      background: #1e293b;
    }
    .hour.current::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: #3b82f6;
    }
    .hour-time {
      font-size: 12px;
      font-weight: 500;
    }
    .hour.current .hour-time { color: #3b82f6; }
    .day-indicator {
      font-size: 9px;
      color: #666;
      margin-top: 2px;
    }
    .day-indicator.diff-day { color: #f59e0b; }
    
    .hours-wrapper::-webkit-scrollbar { height: 6px; }
    .hours-wrapper::-webkit-scrollbar-track { background: #1a1a1a; }
    .hours-wrapper::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    
    @media (min-width: 600px) {
      .city-info { width: 120px; }
      .hour { width: 56px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌍 World Clock</h1>
    
    <div class="controls">
      <select id="citySelect">
        <option value="">Add city...</option>
        <option value="America/New_York">New York</option>
        <option value="America/Los_Angeles">Los Angeles</option>
        <option value="America/Chicago">Chicago</option>
        <option value="Europe/London">London</option>
        <option value="Europe/Paris">Paris</option>
        <option value="Europe/Berlin">Berlin</option>
        <option value="Asia/Dubai">Dubai</option>
        <option value="Asia/Kolkata">Mumbai</option>
        <option value="Asia/Singapore">Singapore</option>
        <option value="Asia/Hong_Kong">Hong Kong</option>
        <option value="Asia/Tokyo">Tokyo</option>
        <option value="Asia/Seoul">Seoul</option>
        <option value="Australia/Sydney">Sydney</option>
        <option value="Pacific/Auckland">Auckland</option>
      </select>
      <button onclick="addCity()">+ Add</button>
    </div>
    
    <div class="timeline" id="timeline"></div>
  </div>

  <script>
    const STORAGE_KEY = 'timezone-cities';
    let cities = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [
      'America/New_York',
      'Europe/London',
      'Asia/Tokyo'
    ];

    function saveCities() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cities));
      render();
    }

    function addCity() {
      const select = document.getElementById('citySelect');
      const city = select.value;
      if (city && !cities.includes(city)) {
        cities.push(city);
        saveCities();
        select.value = '';
      }
    }

    function removeCity(city) {
      cities = cities.filter(c => c !== city);
      saveCities();
    }

    function getTimeInZone(zone) {
      const now = new Date();
      const formatter = new Intl.DateTimeFormat('en-US', {
        timeZone: zone,
        hour: 'numeric',
        hour12: false,
        minute: '2-digit'
      });
      return formatter.format(now);
    }

    function getHourInZone(zone, offsetHours) {
      const now = new Date();
      const targetTime = new Date(now.getTime() + offsetHours * 3600000);
      
      const formatter = new Intl.DateTimeFormat('en-US', {
        timeZone: zone,
        hour: 'numeric',
        hour12: false,
        minute: '2-digit'
      });
      
      const dayFormatter = new Intl.DateTimeFormat('en-US', {
        timeZone: zone,
        weekday: 'short'
      });
      
      return {
        time: formatter.format(targetTime),
        day: dayFormatter.format(targetTime)
      };
    }

    function render() {
      const timeline = document.getElementById('timeline');
      const now = new Date();
      const currentHour = now.getHours();
      
      let html = '';
      
      cities.forEach(city => {
        const cityName = city.split('/')[1].replace(/_/g, ' ');
        const currentTime = getTimeInZone(city);
        
        let hoursHtml = '';
        
        // Show 24 hours: from 12 hours ago to 12 hours ahead
        for (let h = -12; h < 12; h++) {
          const { time, day } = getHourInZone(city, h);
          const isCurrent = h === 0;
          const currentDay = getHourInZone(city, 0).day;
          const isDiffDay = day !== currentDay;
          
          hoursHtml += `
            <div class="hour ${isCurrent ? 'current' : ''}">
              <div class="hour-time">${time}</div>
              <div class="day-indicator ${isDiffDay ? 'diff-day' : ''}">${day}</div>
            </div>
          `;
        }
        
        html += `
          <div class="city-row">
            <div class="city-info">
              <div class="city-name">${cityName}</div>
              <div class="city-current">${currentTime}</div>
              <button class="city-remove" onclick="removeCity('${city}')">✕</button>
            </div>
            <div class="hours-wrapper">
              <div class="hours">${hoursHtml}</div>
            </div>
          </div>
        `;
      });
      
      timeline.innerHTML = html;
    }

    render();
    setInterval(render, 60000);
  </script>
</body>
</html>
